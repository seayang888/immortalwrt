name: Build ImmortalWrt AX3000T 112M

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout 你 fork 的源码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 保证完整历史，用于 feeds / patch

      # 2️⃣ 安装编译环境
      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      # 3️⃣ 注入 Feeds（OpenClash + Passwall）
      - name: Add Feeds
        run: |
          # OpenClash 官方源
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          # Passwall 新仓库
          echo "src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git" >> feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 4️⃣ 加载你的 .config
      - name: Load Config
        run: |
          # 使用仓库根目录的 .config
          cp .config .config.orig || true
          
          # 修改默认管理 IP
          sed -i 's/192.168.1.1/192.168.31.1/g' package/base-files/files/bin/config_generate
          
          # 第一次 defconfig 补全依赖
          make defconfig
          
          # 强制关键组件生效
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_opkg=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_nftables=y" >> .config
          
          # 再次 defconfig 确保所有强制项生效
          make defconfig

      # 5️⃣ 下载依赖
      - name: Download Packages
        run: |
          make download -j$(nproc)

      # 6️⃣ 编译
      - name: Compile Firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      # 7️⃣ 上传固件
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_AX3000T_112M
          path: bin/targets/mediatek/filogic/*sysupgrade.bin
