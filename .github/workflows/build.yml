name: Build ImmortalWrt AX3000T 112M

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget -y

      - name: Add Feeds & OpenClash
        run: |
          # 1. 注入 OpenClash 官方源
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          
          # 2. 更新并安装 Feeds (增加容错)
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 3. 关键修复：手动为 OpenClash 创建软链接（防止某些脚本找不到目录）
          # 这步能解决你报错图中显示的 "No such file or directory" 问题
          [ -d feeds/openclash ] || ./scripts/feeds install -p openclash


      - name: Load Config & Set IP
        run: |
          # 应用仓库根目录的 .config
          [ -e .config ] && cp .config .config.orig || touch .config
          
          # 修改管理 IP 为 192.168.31.1
          sed -i 's/192.168.1.1/192.168.31.1/g' package/base-files/files/bin/config_generate
          
          # 强制补全依赖（解决 Rust/Go 报错关键）
          make defconfig

      - name: Download & Pre-build Cores
        run: |
          # 下载所有依赖包
          make download -j$(nproc)
          # 预先创建 OpenClash 核心存放目录，确保编译时能正确打入固件
          mkdir -p files/etc/openclash/core

      - name: Compile
        run: |
          echo "Starting compile with $(nproc) threads"
          make -j$(nproc) || make -j1 V=s

      - name: Organize Files
        id: organize
        run: |
          cd bin/targets/mediatek/filogic/
          # 只有 sysupgrade.bin 是我们要的固件
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_AX3000T_112M_Final
          path: ${{ env.FIRMWARE_PATH }}/*sysupgrade.bin
