name: Build ImmortalWrt for AX3000T

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget -y

      - name: Update & Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config & Defconfig
        run: |
          # 关键：把仓库里的 .config 复制到编译目录
          [ -e .config ] && cp .config .config.orig || touch .config
          # 执行完这步，系统会自动根据你的 .config 补全 uhttpd 等所有缺失的包
          make defconfig

      - name: Download & Compile
        run: |
          make download -j$(nproc)
          # 首次编译建议 j1 比较稳，或者 j$(nproc) 冲一下
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_AX3000T_Final
          path: bin/targets/mediatek/filogic/*stock-layout*sysupgrade.bin
