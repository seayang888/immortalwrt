name: Build ImmortalWrt for AX3000T

on:
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          # 安装编译 OpenWrt 必须的全部依赖
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget -y
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Update & Install Feeds
        run: |
          # 关键点：直接在当前 Checkout 的源码目录下执行
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Config
        run: |
          # 将你仓库里的 .config 应用到编译环境
          # 如果你没在根目录放 .config，这一步会报错提醒你
          [ -e .config ] && echo "Config file found." || echo "Config file NOT found!"
          make defconfig

      - name: Download package
        run: |
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        run: |
          echo -e "$(nproc) thread compile"
          # 第一次编译建议用 -j1 或者限制线程防止 OOM 报错，这里默认用全线程
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_AX3000T_Stock
          path: bin/targets/mediatek/filogic/*stock-layout*
